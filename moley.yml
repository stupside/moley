access:
  policies:
    - name: moley-allow-email
      decision: allow
      include:
        - email: {email: "kilian.houpeurt@gmail.com"}
    - name: moley-api-service-token
      decision: non_identity
      include:
        - service_token:
            token_id: "REPLACE_WITH_SERVICE_TOKEN_UUID"

ingress:
  mode: subdomain
  zone: "xonery.dev"
  apps:
    - target: {hostname: localhost, port: 3000, protocol: http}
      expose: {subdomain: test}
      access:
        providers: [github, onetimepin]
        session_duration: "168h"
      policies: [moley-allow-email]
    - target: {hostname: localhost, port: 3001, protocol: http}
      expose: {subdomain: api}
      policies: [moley-api-service-token]

tunnel: {id: "demo", name: "test-tunnel", persistent: false}
