access:
  policies:
    - name: moley-allow-email
      decision: allow
      include:
        - email: {email: "kilian.houpeurt@gmail.com"}

ingress:
  mode: subdomain
  zone: "xonery.dev"
  apps:
    - target: {hostname: localhost, port: 3000, protocol: http}
      expose: {subdomain: test}
      access:
        providers: [github, onetimepin]
        session_duration: "168h"
      policies: [moley-allow-email]

tunnel: {id: "demo", name: "test-tunnel", persistent: false}
